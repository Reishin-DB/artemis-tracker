# NOTE: Replace warehouse ID, Genie Space ID, and Lakebase instance
# with your own values before deploying.
command:
  - uvicorn
  - app.main:app
  - --host=0.0.0.0
  - --port=8000

env:
  - name: APP_TITLE
    value: "Artemis II Mission Tracker"
  - name: PGUSER
    valueFrom: artemis-lakebase
  - name: PGPORT
    valueFrom: artemis-lakebase
  - name: PGHOST
    valueFrom: artemis-lakebase
  - name: PGPASSWORD
    valueFrom: artemis-lakebase
  - name: PGDATABASE
    value: "artemis_app"
  - name: LAKEBASE_INSTANCE
    value: "<your-lakebase-instance>"
  - name: DATABRICKS_WAREHOUSE_ID
    value: "<your-warehouse-id>"
  - name: GENIE_SPACE_ID
    value: "<your-genie-space-id>"

resources:
  - name: artemis-lakebase
    description: "Lakebase PostgreSQL for Artemis II mission data"
    database:
      instance_name: <your-lakebase-instance>
      database_name: artemis_app
      permission: CAN_CONNECT_AND_CREATE
